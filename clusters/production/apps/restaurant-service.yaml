apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: restaurant-service
  namespace: default
spec:
  interval: 5m
  chart:
    spec:
      chart: ./foodbyte-restaurant-service
      sourceRef:
        kind: GitRepository
        name: foodbyte-charts
        namespace: flux-system
  values:
    replicaCount: 2
    useSecrets: true
    externalDatabase:
      enabled: false
    image:
      tag: "fa17f531503ff94940a4337ace75ea8492a027a1"
    resources:
      limits:
        cpu: 200m
        memory: 512Mi
      requests:
        cpu: 50m
        memory: 256Mi
