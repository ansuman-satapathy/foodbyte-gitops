apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: foodbyte-infra-source
  namespace: flux-system
spec:
  interval: 1m
  url: https://github.com/ansuman-satapathy/foodbyte-infra
  ref:
    branch: main
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: core-infrastructure
  namespace: flux-system
spec:
  interval: 10m
  path: "./clusters/production/infrastructure" # Updated path in new repo
  prune: true
  sourceRef:
    kind: GitRepository
    name: foodbyte-flux
  timeout: 5m
