apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: order-service
  namespace: default
spec:
  interval: 5m
  chart:
    spec:
      chart: ./foodbyte-order-service
      sourceRef:
        kind: GitRepository
        name: foodbyte-charts
        namespace: flux-system
  values:
    replicaCount: 2
    useSecrets: true
    externalDatabase:
      enabled: false
    image:
      tag: "fa68e3f7c9b73ee269de6204d12a3fd2daf45783"
    resources:
      limits:
        cpu: 200m
        memory: 512Mi
      requests:
        cpu: 50m
        memory: 256Mi
