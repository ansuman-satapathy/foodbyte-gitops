apiVersion: fluxcd.controlplane.io/v1
kind: FluxInstance
metadata:
  name: flux
  namespace: flux-system
spec:
  distribution:
    version: "2.8.x"
    registry: "ghcr.io/fluxcd"
    artifact: "oci://ghcr.io/controlplaneio-fluxcd/flux-operator-manifests"
  
  components:
    - source-controller
    - kustomize-controller
    - helm-controller
    - notification-controller
    - image-reflector-controller
    - image-automation-controller

  cluster:
    type: kubernetes
    size: medium
    multitenant: false
    networkPolicy: true

  sync:
    kind: GitRepository
    url: "https://github.com/ansuman-satapathy/foodbyte-gitops"
    ref: "refs/heads/main"
    path: "clusters/production/bootstrap"
    interval: "1m"
