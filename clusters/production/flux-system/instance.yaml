apiVersion: fluxcd.controlplane.io/v1
kind: FluxInstance
metadata:
  name: foodbyte-flux
  namespace: flux-system
spec:
  distribution:
    version: "2.8.x"
    registry: "ghcr.io/fluxcd"
    artifact: "oci://ghcr.io/controlplaneio-fluxcd/flux-operator-manifests"
  
  components:
    - source-controller
    - kstatus-controller
    - helm-controller
    - notification-controller
    - image-reflector-controller
    - image-automation-controller

  cluster:
    type: kubernetes
    size: medium
    multitenant: false
    networkPolicy: true

  sync:
    kind: GitRepository
    url: "https://github.com/ansuman-satapathy/foodbyte-gitops" # NEW REPO
    ref:
      branch: main
    path: "clusters/production" # Watches the whole cluster tree
    pullSecret: "flux-system"
    interval: "1m"
