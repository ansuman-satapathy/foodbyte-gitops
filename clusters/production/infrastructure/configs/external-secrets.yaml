apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: user-service-secrets
  namespace: default
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: user-service-foodbyte-user-service-secrets
    creationPolicy: Owner
    template:
      data:
        jwt-secret: "{{ .jwt_secret }}"
        database-url: "postgresql://user_admin:{{ .postgres_password }}@user-service-db:5432/user_db"
  data:
  - secretKey: jwt_secret
    remoteRef:
      key: foodbyte/prod/jwt-secret
  - secretKey: postgres_password
    remoteRef:
      key: foodbyte/prod/postgres-password
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: order-service-secrets
  namespace: default
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: order-service-foodbyte-order-service-secrets
    creationPolicy: Owner
    template:
      data:
        jwt-secret: "{{ .jwt_secret }}"
        database-url: "postgresql://order_admin:{{ .postgres_password }}@order-service-db:5432/order_db"
        rabbitmq-url: "amqp://user:{{ .rabbitmq_password }}@order-service-rabbitmq:5672/"
  data:
  - secretKey: jwt_secret
    remoteRef:
      key: foodbyte/prod/jwt-secret
  - secretKey: postgres_password
    remoteRef:
      key: foodbyte/prod/postgres-password
  - secretKey: rabbit_password
    remoteRef:
      key: foodbyte/prod/rabbitmq-password
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: restaurant-service-secrets
  namespace: default
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: restaurant-service-foodbyte-restaurant-service-secrets
    creationPolicy: Owner
    template:
      data:
        jwt-secret: "{{ .jwt_secret }}"
        database-url: "mongodb://restaurant_admin:{{ .mongo_password }}@restaurant-service-db:27017/restaurant_db?authSource=admin"
  data:
  - secretKey: jwt_secret
    remoteRef:
      key: foodbyte/prod/jwt-secret
  - secretKey: mongo_password
    remoteRef:
      key: foodbyte/prod/mongo-password
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: notification-service-secrets
  namespace: default
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: notification-service-foodbyte-notification-service-secrets
    creationPolicy: Owner
    template:
      data:
        jwt-secret: "{{ .jwt_secret }}"
        rabbitmq-url: "amqp://user:{{ .rabbitmq_password }}@notification-service-rabbitmq:5672/"
        redis-url: "redis://:{{ .redis_password }}@notification-service-redis:6379/0"
  data:
  - secretKey: jwt_secret
    remoteRef:
      key: foodbyte/prod/jwt-secret
  - secretKey: rabbitmq_password
    remoteRef:
      key: foodbyte/prod/rabbitmq-password
  - secretKey: redis_password
    remoteRef:
      key: foodbyte/prod/redis-password
