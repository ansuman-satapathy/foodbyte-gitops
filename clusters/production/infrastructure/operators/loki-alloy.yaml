apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: grafana-charts
  namespace: flux-system
spec:
  interval: 1h
  url: https://grafana.github.io/helm-charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: loki
  namespace: monitoring
spec:
  interval: 1h
  chart:
    spec:
      chart: loki
      version: "6.55.0"
      sourceRef:
        kind: HelmRepository
        name: grafana-charts
        namespace: flux-system
  install:
    createNamespace: false
  values:
    deploymentMode: SingleBinary
    test: { enabled: false }
    loki:
      auth_enabled: false
      commonConfig:
        replication_factor: 1
      storage:
        type: filesystem
      schemaConfig:
        configs:
          - from: "2024-01-01"
            store: tsdb
            object_store: filesystem
            schema: v13
            index:
              period: 24h
              prefix: loki_index_
    backend: { replicas: 0 }
    read: { replicas: 0 }
    write: { replicas: 0 }
    singleBinary:
      replicas: 1
      persistence:
        enabled: true
        size: 10Gi
        storageClass: ebs-sc
    lokiCanary: { enabled: false }
    chunksCache: { enabled: false }
    resultsCache: { enabled: false }
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: alloy
  namespace: monitoring
spec:
  interval: 1h
  chart:
    spec:
      chart: alloy
      version: "1.8.1"
      sourceRef:
        kind: HelmRepository
        name: grafana-charts
        namespace: flux-system
  install:
    createNamespace: false
  values:
    alloy:
      configReloader:
        enabled: true
      # 🏁 RESEARCH-BACKED FIX: Corrected the field name to configMap.content
      configMap:
        content: |
          logging {
            level  = "info"
            format = "logfmt"
          }

          // 1. Discover all pods in the cluster
          discovery.kubernetes "pods" {
            role = "pod"
          }

          // 2. Add metadata labels (Namespace, Pod, Container)
          discovery.relabel "logs" {
            targets = discovery.kubernetes.pods.targets
            rule {
              source_labels = ["__meta_kubernetes_namespace"]
              target_label  = "namespace"
            }
            rule {
              source_labels = ["__meta_kubernetes_pod_name"]
              target_label  = "pod"
            }
            rule {
              source_labels = ["__meta_kubernetes_pod_container_name"]
              target_label  = "container"
            }
          }

          // 3. Collect the logs
          loki.source.kubernetes "all_pods" {
            targets    = discovery.relabel.logs.output
            forward_to = [loki.write.local.receiver]
          }

          // 4. Send to the Loki Gateway
          loki.write "local" {
            endpoint {
              url = "http://loki-gateway.monitoring.svc.cluster.local/loki/api/v1/push"
            }
          }
    # 🚨 CRITICAL: Ensure ServiceAccount has permissions to read logs
    controller:
      rbac:
        create: true
