apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure
  namespace: flux-system
spec:
  interval: 10m
  path: "./clusters/production/infrastructure"
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux
  timeout: 5m
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps
  namespace: flux-system
spec:
  interval: 10m
  path: "./clusters/production/apps"
  prune: true
  dependsOn:
    - name: infrastructure 
  sourceRef:
    kind: GitRepository
    name: flux
  timeout: 5m
