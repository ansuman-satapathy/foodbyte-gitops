# 1. The Source for Helm Charts (Microservice Blueprints)
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: foodbyte-charts
  namespace: flux-system
spec:
  interval: 1m
  url: https://github.com/ansuman-satapathy/foodbyte-helm-charts
  ref:
    branch: main
---
# 2. Wave 1: The Operators (The "Brains")
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra-operators
  namespace: flux-system
spec:
  interval: 10m
  path: "./clusters/production/infrastructure/operators"
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  timeout: 5m
---
# 3. Wave 2: The Configs (The "Address & Storage")
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra-configs
  namespace: flux-system
spec:
  interval: 10m
  path: "./clusters/production/infrastructure/configs"
  prune: true
  dependsOn:
    - name: infra-operators # Wait for Tools to be installed first
  sourceRef:
    kind: GitRepository
    name: flux-system
  timeout: 5m
---
# 4. Wave 3: The Microservices (The "Workloads")
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps
  namespace: flux-system
spec:
  interval: 10m
  path: "./clusters/production/apps"
  prune: true
  dependsOn:
    - name: infra-configs # Wait for Ingress/Storage to be ready
  sourceRef:
    kind: GitRepository
    name: flux-system
  timeout: 5m
