apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: foodbyte-charts
  namespace: flux-system
spec:
  interval: 1m
  url: https://github.com/ansuman-satapathy/foodbyte-helm-charts
  ref:
    branch: main
---

apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra-operators
  namespace: flux-system
spec:
  interval: 10m
  path: "./clusters/production/infrastructure/operators"
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  healthChecks:
    - apiVersion: apps/v1
      kind: Deployment
      name: external-secrets
      namespace: external-secrets
    - apiVersion: apps/v1
      kind: Deployment
      name: envoy-gateway
      namespace: envoy-gateway-system
    - apiVersion: apps/v1
      kind: Deployment
      name: kube-prometheus-stack-operator
      namespace: monitoring
    - apiVersion: apps/v1
      kind: StatefulSet
      name: loki
      namespace: monitoring
  timeout: 5m
---

apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra-configs
  namespace: flux-system
spec:
  interval: 10m
  path: "./clusters/production/infrastructure/configs"
  prune: true
  dependsOn:
    - name: infra-operators
  sourceRef:
    kind: GitRepository
    name: flux-system
  healthChecks:
    - apiVersion: gateway.networking.k8s.io/v1
      kind: Gateway
      name: foodbyte-gateway
      namespace: default
  timeout: 5m
---

apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps
  namespace: flux-system
spec:
  interval: 10m
  path: "./clusters/production/apps"
  prune: true
  dependsOn:
    - name: infra-configs
  sourceRef:
    kind: GitRepository
    name: flux-system
  timeout: 5m
